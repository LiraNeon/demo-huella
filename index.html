<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Campaña Lentes</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background-color: #f2f2f2;
}

h2 {
    text-align: center;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.clear-btn {
    background-color: #dc3545;
}

canvas {
    border: 2px solid #333;
    border-radius: 8px;
    background: #fff;
    width: 100%;
    height: 200px;
    touch-action: none;
    display: block;
    margin-bottom: 10px;
}

.small {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<h2>Registro de Entrega de Lentes</h2>

<div class="card">

<p><b>Campaña:</b> Ayacucho 2026</p>
<p><b>Región:</b> Ayacucho</p>

<label>Distrito</label>
<select id="distrito">
    <option value="">Seleccione</option>
    <option>Huamanga</option>
    <option>San Juan Bautista</option>
    <option>Carmen Alto</option>
    <option>Jesús Nazareno</option>
</select>

<label>Nombre del Promotor</label>
<input type="text" id="promotor">

<label>Fecha de Entrega</label>
<input type="datetime-local" id="fecha">

<label>Nombre Completo Beneficiario</label>
<input type="text" id="nombre">

<label>DNI</label>
<input type="text" id="dni">

<label>Edad</label>
<input type="number" id="edad">

<label>Sexo</label>
<select id="sexo">
    <option value="">Seleccione</option>
    <option>Masculino</option>
    <option>Femenino</option>
</select>

<label>Medida de Lente</label>
<select id="medida">
    <option value="">Seleccione</option>
    <option>1.00</option>
    <option>1.50</option>
    <option>2.00</option>
    <option>2.50</option>
    <option>3.00</option>
</select>

<label>Huella del Beneficiario</label>
<canvas id="canvasHuella"></canvas>
<button class="clear-btn" onclick="limpiarCanvas('canvasHuella')">Limpiar Huella</button>

<p class="small">El beneficiario debe colocar su dedo y marcar la huella.</p>

<label>Firma del Beneficiario (si puede firmar)</label>
<canvas id="canvasFirma"></canvas>
<button class="clear-btn" onclick="limpiarCanvas('canvasFirma')">Limpiar Firma</button>

<button onclick="guardar()">Guardar Registro</button>

</div>

<script>

// Fecha automática actual
document.getElementById("fecha").value = new Date().toISOString().slice(0,16);

function configurarCanvas(id) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let drawing = false;

    canvas.addEventListener("touchstart", function(e) {
        e.preventDefault();
        drawing = true;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.beginPath();
        ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    canvas.addEventListener("touchmove", function(e) {
        if (!drawing) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
        ctx.stroke();
    });

    canvas.addEventListener("touchend", function() {
        drawing = false;
    });

    return canvas;
}

const canvasHuella = configurarCanvas("canvasHuella");
const canvasFirma = configurarCanvas("canvasFirma");

function limpiarCanvas(id) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function guardar() {

    const nombre = document.getElementById("nombre").value;
    const dni = document.getElementById("dni").value;
    const promotor = document.getElementById("promotor").value;
    const distrito = document.getElementById("distrito").value;
    const fecha = document.getElementById("fecha").value;
    const edad = document.getElementById("edad").value;
    const sexo = document.getElementById("sexo").value;
    const medida = document.getElementById("medida").value;

    if (!nombre || !dni || !promotor || !distrito || !medida) {
        alert("Complete todos los campos obligatorios.");
        return;
    }

    navigator.geolocation.getCurrentPosition(function(pos) {

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const csv = `Campaña,Ayacucho 2026
Región,Ayacucho
Distrito,${distrito}
Promotor,${promotor}
Fecha Entrega,${fecha}
Nombre,${nombre}
DNI,${dni}
Edad,${edad}
Sexo,${sexo}
Medida Lente,${medida}
Latitud,${lat}
Longitud,${lon}`;

        const blob = new Blob([csv], { type: "text/csv" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "registro_" + dni + ".csv";
        link.click();

        const huellaLink = document.createElement("a");
        huellaLink.download = "huella_" + dni + ".png";
        huellaLink.href = canvasHuella.toDataURL("image/png");
        huellaLink.click();

        const firmaLink = document.createElement("a");
        firmaLink.download = "firma_" + dni + ".png";
        firmaLink.href = canvasFirma.toDataURL("image/png");
        firmaLink.click();

        alert("Registro guardado correctamente.");

    }, function() {
        alert("No se pudo obtener GPS.");
    });
}

</script>

</body>
</html>
