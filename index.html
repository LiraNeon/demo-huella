<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Campaña Lentes</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background-color: #f2f2f2;
}

h2 {
    text-align: center;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

canvas {
    border: 2px solid #333;
    border-radius: 8px;
    background: #fff;
    width: 100%;
    height: 200px;
    touch-action: none;
}

.small {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<h2>Registro de Entrega de Lentes</h2>

<div class="card">

<p><b>Operador:</b> Juan Diego (Demo)</p>
<p><b>Campaña:</b> Ayacucho 2026</p>

<label>Nombre Completo</label>
<input type="text" id="nombre">

<label>DNI</label>
<input type="text" id="dni">

<label>Edad</label>
<input type="number" id="edad">

<label>Sexo</label>
<select id="sexo">
    <option value="">Seleccione</option>
    <option>Masculino</option>
    <option>Femenino</option>
</select>

<label>Medida de Lente</label>
<input type="text" id="medida">

<label>Huella del Beneficiario</label>
<canvas id="canvas"></canvas>

<p class="small">El beneficiario debe dibujar su huella con el dedo.</p>

<button onclick="guardar()">Guardar Registro</button>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Ajustar tamaño real del canvas correctamente
function ajustarCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 200;
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#111";
}

ajustarCanvas();
window.addEventListener("resize", ajustarCanvas);

let dibujando = false;

function getPosicion(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top
    };
}

canvas.addEventListener("touchstart", function(e) {
    e.preventDefault();
    dibujando = true;
    const pos = getPosicion(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener("touchmove", function(e) {
    if (!dibujando) return;
    e.preventDefault();
    const pos = getPosicion(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
});

canvas.addEventListener("touchend", function(e) {
    dibujando = false;
});

function guardar() {
    const nombre = document.getElementById("nombre").value;
    const dni = document.getElementById("dni").value;

    if (!nombre || !dni) {
        alert("Complete los campos obligatorios.");
        return;
    }

    const fecha = new Date().toLocaleString();

    navigator.geolocation.getCurrentPosition(function(pos) {

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const csv = `Nombre,${nombre}
DNI,${dni}
Fecha,${fecha}
Latitud,${lat}
Longitud,${lon}`;

        const blob = new Blob([csv], { type: "text/csv" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "registro_" + dni + ".csv";
        link.click();

        const imageLink = document.createElement("a");
        imageLink.download = "huella_" + dni + ".png";
        imageLink.href = canvas.toDataURL("image/png");
        imageLink.click();

        alert("Registro guardado correctamente.");

    }, function() {
        alert("No se pudo obtener GPS.");
    });
}
</script>
</body>
</html>
